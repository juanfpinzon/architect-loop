<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  /* 1600x620 ~= the 2.6:1 crop X actually renders for article covers.
     All content lives in the middle 50% vertical band so it also survives
     an ultrawide (5:1) re-crop. */
  body { width:1600px; height:620px; background:#0d1117; font-family:"Cascadia Code",Consolas,monospace; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .wrap { text-align:center; }
  h1 { color:#e6edf3; font-size:58px; font-weight:600; letter-spacing:-1px; }
  h1 .slash { color:#6e7681; }
  .tag { font-size:24px; color:#8b949e; margin-top:12px; }
  .flow { display:flex; align-items:center; justify-content:center; gap:16px; margin-top:34px; }
  .node { border-radius:10px; padding:14px 22px; text-align:center; }
  .node .role { font-size:13px; letter-spacing:2px; }
  .node .who { font-size:19px; font-weight:600; margin-top:4px; }
  .fable { background:#1c1410; border:2px solid #d97757; }
  .fable .role { color:#d97757; } .fable .who { color:#f0c5ae; }
  .codex { background:#0e1a16; border:2px solid #10a37f; }
  .codex .role { color:#10a37f; } .codex .who { color:#a7e3d2; }
  .repo  { background:#1a1607; border:2px solid #e3b341; }
  .repo .role { color:#e3b341; } .repo .who { color:#f2dd9b; }
  .arr { color:#6e7681; font-size:20px; line-height:1.4; }
</style></head><body>
  <div class="wrap">
    <h1><span class="slash">/</span>architect-loop</h1>
    <div class="tag">Cut your Fable token burn. Not your Fable quality.</div>
    <div class="flow">
      <div class="node fable"><div class="role">ARCHITECT</div><div class="who">Claude Fable</div></div>
      <div class="arr">spec ⟶<br>⟵ evidence</div>
      <div class="node codex"><div class="role">BUILDER</div><div class="who">GPT-5.5 Codex</div></div>
      <div class="arr">⟶<br>commits</div>
      <div class="node repo"><div class="role">MEMORY</div><div class="who">the repo</div></div>
    </div>
  </div>
</body></html>
